apiVersion: reshapr.io/v1alpha1
kind: CustomTools
service:
  name: GitHub GraphQL
  version: '20250917'
customTools:
  get_user_with_latest_followers:
    # tool is missing and it is required
    description: Get a user details with the latest followers details
    input:
      type: object
      properties:
        user:
          description: The GitHub handle of the user
          type: string
      required:
        - user
    arguments:
      login: ${user}
      __relation_avatarUrl:
        size: 32
      __relation_followers:
        last: 10





