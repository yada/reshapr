services:
  postgres:
    image: library/postgres:17-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "54321:5432"
    volumes:
      - "~/tmp/reshapr-data:/var/lib/postgresql/data/pgdata"
    environment:
      - POSTGRES_USER=reshapr
      - POSTGRES_PASSWORD=reshapr
      - POSTGRES_DB=reshapr
      - PGDATA=/var/lib/postgresql/data/pgdata

  control-plane:
    image: registry.reshapr.io/reshapr/reshapr-ctrl:nightly
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "5555:5555"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/reshapr
      - QUARKUS_DATASOURCE_USERNAME=reshapr
      - QUARKUS_DATASOURCE_PASSWORD=reshapr
      - RESHAPR_ADMIN_NAME=admin
      - RESHAPR_ADMIN_PASSWORD=password
      - RESHAPR_ADMIN_EMAIL=reshapr@example.com
      - RESHAPR_DEFAULT_GATEWAY_TOKENS=my-super-secret-token-xyz
      # Enable debug logging for the control plane to help with troubleshooting
      #- QUARKUS_LOG_CONSOLE_LEVEL=DEBUG
      #- QUARKUS_LOG_CATEGORY__IO_RESHAPR_CTRL__LEVEL=DEBUG
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5555/q/health/ready" ]
      start_period: 10s
      interval: 10s
      timeout: 2s
      retries: 3