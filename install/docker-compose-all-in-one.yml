services:
  postgres:
    image: library/postgres:17-alpine
    container_name: reshapr-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "54321:5432"
    volumes:
      - "~/tmp/reshapr-data:/var/lib/postgresql/data/pgdata"
    environment:
      - POSTGRES_USER=reshapr
      - POSTGRES_PASSWORD=reshapr
      - POSTGRES_DB=reshapr
      - PGDATA=/var/lib/postgresql/data/pgdata

  control-plane:
    image: quay.io/reshapr/reshapr-ctrl:nightly
    container_name: reshapr-control-plane
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "5555:5555"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/reshapr
      - QUARKUS_DATASOURCE_USERNAME=reshapr
      - QUARKUS_DATASOURCE_PASSWORD=reshapr
      - QUARKUS_FLYWAY_LOCATIONS=db/migration,db/data,db/dev-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5555/q/health/ready" ]
      start_period: 6s
      interval: 10s
      timeout: 2s
      retries: 3

  gateway-01:
    image: quay.io/reshapr/reshapr-proxy:nightly
    container_name: reshapr-gateway-01
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: on-failure
    ports:
      - "7777:7777"
    environment:
      RESHAPR_CTRL_HOST: control-plane
      RESHAPR_CTRL_PORT: 5555
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7777/q/health/ready" ]
      start_period: 5s
      interval: 10s
      timeout: 2s
      retries: 3