name: build-container-images
on:
  workflow_call:
    inputs:
      image-tag:
        description: 'The tag to use for the images'
        required: true
        type: string

jobs:
  build-containers:
    if: github.repository_owner == 'reshaprio' && inputs.image-tag != ''
    runs-on: ubuntu-latest
    environment: Build
    permissions:
      contents: read
      packages: write
      id-token: write # needed for signing the images with GitHub OIDC Token

    steps:
      - name: Get current date
        id: date
        #run: echo "::set-output name=date::$(date +'%Y-%m-%dT%H:%M:%S')"
        run: echo "date=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.21

      - name: Set up JDK 21 for x64
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: Build Java components
        run: mvn -B -DskipTests clean install

      - name: Set IMAGE_TAG environment from input
        run: |
          set -x
          echo "IMAGE_TAG=${{ inputs.image-tag }}" >> "$GITHUB_ENV"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3.7.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Quay.io and Docker Hub registries and setup multi-arch builder
        run: |
          echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USERNAME }} --password-stdin quay.io
          BUILDER=buildx-multi-arch
          docker buildx inspect $BUILDER || docker buildx create --name=$BUILDER --driver=docker-container --driver-opt=network=host

      - name: Build and push container image for control plane
        id: build-and-push-ctrl
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{github.workspace}}/control-plane
          sbom: true
          push: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          builder: buildx-multi-arch
          file: control-plane/src/main/docker/Dockerfile.jvm
          labels: |
            org.opencontainers.image.revision=${GITHUB_SHA}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          tags: quay.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}}

      - name: Build and push container image for proxy
        id: build-and-push-proxy
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{github.workspace}}/proxy
          sbom: true
          push: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          builder: buildx-multi-arch
          file: proxy/src/main/docker/Dockerfile.jvm
          labels: |
            org.opencontainers.image.revision=${GITHUB_SHA}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          tags: quay.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}}

      - name: Sign the control plane image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push-ctrl.outputs.digest }}
          TAGS: quay.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --new-bundle-format=false --use-signing-config=false --yes ${images}

      - name: Sign the proxy image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push-proxy.outputs.digest }}
          TAGS: quay.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --new-bundle-format=false --use-signing-config=false --yes ${images}