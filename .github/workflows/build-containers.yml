name: build-container-images
on:
  workflow_call:
    inputs:
      image-tag:
        description: 'The tag to use for the images'
        required: true
        type: string

jobs:
  build-containers:
    if: github.repository_owner == 'reshaprio' && inputs.image-tag != ''
    runs-on: ubuntu-latest
    environment: Build
    permissions:
      contents: read
      packages: write
      id-token: write # needed for signing the images with GitHub OIDC Token

    steps:
      - name: Get current date
        id: date
        #run: echo "::set-output name=date::$(date +'%Y-%m-%dT%H:%M:%S')"
        run: echo "date=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.21

      - name: Set up JDK 25 for x64
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: Build Java components
        run: mvn -B -DskipTests clean install

      - name: Set IMAGE_TAG environment from input
        run: |
          set -x
          echo "IMAGE_TAG=${{ inputs.image-tag }}" >> "$GITHUB_ENV"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v3.7.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Quay.io and Docker Hub registries and setup multi-arch builder
        run: |
          echo ${{ secrets.QUAY_PASSWORD }} | docker login -u ${{ secrets.QUAY_USERNAME }} --password-stdin quay.io
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin docker.io
          BUILDER=buildx-multi-arch
          docker buildx inspect $BUILDER || docker buildx create --name=$BUILDER --driver=docker-container --driver-opt=network=host

      - name: Build and push container image for control plane
        id: build-and-push-ctrl
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{github.workspace}}/control-plane
          sbom: true
          push: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          builder: buildx-multi-arch
          file: control-plane/src/main/docker/Dockerfile.jvm
          labels: |
            org.opencontainers.image.revision=${GITHUB_SHA}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          tags: quay.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}},docker.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}}

      - name: Build and push container image for proxy
        id: build-and-push-proxy
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{github.workspace}}/proxy
          sbom: true
          push: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          builder: buildx-multi-arch
          file: proxy/src/main/docker/Dockerfile.jvm
          labels: |
            org.opencontainers.image.revision=${GITHUB_SHA}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          tags: quay.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}},docker.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}}

      - name: Build and push container image for web-ui
        id: build-and-push-ui
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{github.workspace}}/web-ui
          sbom: true
          push: true
          provenance: mode=max
          platforms: linux/amd64,linux/arm64
          builder: buildx-multi-arch
          file: web-ui/Dockerfile
          labels: |
            org.opencontainers.image.revision=${GITHUB_SHA}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          tags: quay.io/reshapr/reshapr-ui:${{env.IMAGE_TAG}},docker.io/reshapr/reshapr-ui:${{env.IMAGE_TAG}}

      - name: Sign the control plane image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push-ctrl.outputs.digest }}
          TAGS: quay.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}} docker.io/reshapr/reshapr-ctrl:${{env.IMAGE_TAG}}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --new-bundle-format=false --use-signing-config=false --yes ${images}

      - name: Sign the proxy image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push-proxy.outputs.digest }}
          TAGS: quay.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}} docker.io/reshapr/reshapr-proxy:${{env.IMAGE_TAG}}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --new-bundle-format=false --use-signing-config=false --yes ${images}

      - name: Sign the web-ui image with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build-and-push-ui.outputs.digest }}
          TAGS: quay.io/reshapr/reshapr-ui:${{env.IMAGE_TAG}} docker.io/reshapr/reshapr-ui:${{env.IMAGE_TAG}}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --new-bundle-format=false --use-signing-config=false --yes ${images}